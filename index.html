<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BB - Blast | Puzzle Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="level-1">
    <div id="game-container">
        <header>
            <h1 id="game-title">BB - BLAST</h1>
            <div id="score-container">
                <div class="score-label">SCORE</div>
                <div id="score">0000</div>
            </div>
            <div id="high-score-container">
                <div class="score-label">BEST</div>
                <div id="high-score">0</div>
            </div>
        </header>

        <main>
            <div id="board-container">
                <div id="board" class="grid-8x8">
                    <!-- Grid cells will be generated by JS -->
                </div>
                <canvas id="effect-canvas"></canvas>
            </div>

            <div id="preview-container">
                <div class="preview-slot" id="slot-0"></div>
                <div class="preview-slot" id="slot-1"></div>
                <div class="preview-slot" id="slot-2"></div>
            </div>
        </main>

        <div id="game-over-overlay" class="hidden">
            <div class="game-over-content">
                <h2>OYUN BİTTİ</h2>
                <p>Final Skoru: <span id="final-score">0</span></p>
                <button id="restart-btn">TEKRAR DENE</button>
            </div>
        </div>

        <div id="level-up-notification" class="hidden">
            <h3 id="level-text">LEVEL UP!</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
