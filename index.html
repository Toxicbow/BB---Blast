<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="BB - Blast: Neon-themed block puzzle game. Drag and drop colourful blocks to clear rows and columns!">
    <title>BB - Blast | Puzzle Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="level-1">

    <!-- Combo popup (shown on multi-line clears) -->
    <div id="combo-display"></div>

    <div id="game-container">
        <!-- Main Menu Overlay -->
        <div id="main-menu">
            <h1 id="menu-title">BB — BLAST</h1>
            <button id="play-btn">PLAY GAME</button>
            <div id="changelog-container">
                <h4>Güncelleme Notları</h4>
                <ul>
                    <li>[v1.2] Ekran taşma hataları düzeltildi & Responsive UI yapıldı</li>
                    <li>[v1.1] Arka Plan Müziği ve Sessize Alma Butonu Eklendi</li>
                    <li>[v1.0] Klasik Block Blast Mekanikleri ve Neon Tasarım</li>
                </ul>
            </div>
        </div>

        <header class="game-ui hidden">
            <h1 id="game-title">BB — BLAST</h1>

            <div id="score-container">
                <div class="score-label">SCORE</div>
                <div id="score">0000</div>
            </div>

            <div id="high-score-container">
                <div class="score-label">BEST</div>
                <div id="high-score">0</div>
            </div>

            <!-- Music toggle button -->
            <button id="music-btn" aria-label="Müzik Aç/Kapat" title="Müzik Aç/Kapat">
                🔇
            </button>
        </header>

        <main class="game-ui hidden">
            <div id="board-container">
                <div id="board" class="grid-8x8">
                    <!-- Grid cells generated by JS -->
                </div>
                <canvas id="effect-canvas"></canvas>
            </div>

            <div id="preview-container">
                <div class="preview-slot" id="slot-0"></div>
                <div class="preview-slot" id="slot-1"></div>
                <div class="preview-slot" id="slot-2"></div>
            </div>
        </main>

        <!-- Game Over Overlay -->
        <div id="game-over-overlay" class="hidden">
            <div class="game-over-content">
                <h2>OYUN BİTTİ</h2>
                <p>Toplam Skor</p>
                <span id="final-score">0</span>
                <p class="game-over-best-label">En İyi: <span id="final-best">0</span></p>
                <button id="restart-btn">TEKRAR DENE</button>
            </div>
        </div>

        <!-- Level Up Notification -->
        <div id="level-up-notification" class="hidden">
            <h3 id="level-text">LEVEL UP!</h3>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
